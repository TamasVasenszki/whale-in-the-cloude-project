services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./files:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api1
      - api2
    networks:
      - public_net

  api1:
    image: ${APP_IMAGE}
    environment:
      - INSTANCE_NAME=api1
      - DB_HOST=
      - DB_PORT=
      - DB_USER=
      - DB_PASSWORD=
      - DB_NAME=
    dns:
      - 1.1.1.1
      - 1.1.1.2
      - 1.1.1.3
    networks:
      - public_net
      - internal_net

  api2:
    image: ${APP_IMAGE}
    environment:
      - INSTANCE_NAME=api2
      - DB_HOST=
      - DB_PORT=
      - DB_USER=
      - DB_PASSWORD=
      - DB_NAME=
    dns:
      - 1.1.1.1
      - 1.1.1.2
      - 1.1.1.3
    networks:
      - public_net
      - internal_net

networks:
  public_net:
  internal_net:
    internal: true