services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./files:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - public_net
  
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal_net

  api1:
    build: ./backend
    environment:
      - INSTANCE_NAME=api1
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    dns:
      - 1.1.1.1
      - 1.1.1.2
      - 1.1.1.3
    networks:
      - public_net
      - internal_net
  
  api2:
    build: ./backend
    environment:
      - INSTANCE_NAME=api2
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    dns:
      - 1.1.1.1
      - 1.1.1.2
      - 1.1.1.3
    networks:
      - public_net
      - internal_net
  
  backup:
    image: postgres:16-alpine
    command: sleep infinity
    environment:
      - PGPASSWORD=${PGPASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_NAME=${DB_NAME}
    volumes:
      - pgbackup:/backups
    depends_on:
      - postgres
    networks:
      - internal_net
  
  analyzer:
    image: alpine:3.20
    volumes:
      - pgbackup:/backups:ro
      - reports:/reports
      - ./analyzer/analyze.sh:/analyze.sh:ro
    networks:
      - internal_net
    command: sh /analyze.sh

volumes:
  pgdata:
  pgbackup:
  reports:

networks:
  public_net:
  internal_net:
    internal: true